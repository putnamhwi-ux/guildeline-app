<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Anaesthesia Hub</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2e7d32">

  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="icon" href="icons/icon-192.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff8e6;
    }

  .header {
  background: #2e7d32; /* forest green */
  padding: 16px;
  margin-bottom: 10px;
}

.header h1 {
  color: white;
  font-size: 26px;
}
}
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 24px;
      color: #5a3e00;
    }

    #search {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #e0c97f;
      background: #fffdf5;
      outline: none;
      box-sizing: border-box;
    }

    #content {
      max-width: 800px;
      margin: auto;
      padding: 0 16px 20px 16px;
    }

    .card {
      background: #fff3cc;
      border: 1px solid #f0d98a;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;

      display: flex;
      justify-content: space-between;
      align-items: center;

      transition: 0.15s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      color: #4a3200;
    }

    .meta {
      font-size: 12px;
      color: #7a5a00;
      margin-top: 4px;
    }

    .arrow {
      font-size: 18px;
      color: #b08900;
    }

    #loader {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.95);
      z-index: 9999;

      justify-content: center;
      align-items: center;
      font-size: 18px;
      color: #5a3e00;
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">Loading...</div>

  <!-- HEADER -->
  <div class="header">
    <h1>Anaesthesia Hub</h1>
    <input type="text" id="search" placeholder="Search guidelines..." />
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
