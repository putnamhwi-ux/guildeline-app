<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Guidelines</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="icon" href="icons/icon-192.png">

</head>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background: #fff8e6;
    }

    h1 {
      text-align: center;
      color: #5a3e00;
    }

    #search {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin: 15px 0;
      border-radius: 8px;
      border: 1px solid #e0c97f;
      background: #fffdf5;
    }

    #filters {
      text-align: center;
      margin-bottom: 15px;
    }

    #filters button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 20px;
      background: #f4c542;
      color: #5a3e00;
      cursor: pointer;
      font-weight: bold;
    }

    #content {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #fff3cc;
      border: 1px solid #f0d98a;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.1s;
    }

    .card:hover {
      transform: scale(1.01);
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 17px;
      font-weight: bold;
      color: #4a3200;
    }

    .meta {
      font-size: 12px;
      color: #7a5a00;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <h1>Medical Guidelines</h1>

  <input type="text" id="search" placeholder="Search guidelines..." />

  <div id="filters"></div>

  <div id="content"></div>

  <script src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("Service Worker Registered"));
  }
</script>
</body>
</html>
